<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Signal Web App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e17;
      --bg-card: rgba(18, 26, 44, 0.6);
      --border-card: rgba(255, 255, 255, 0.08);
      --accent-blue: #007aff;
      --accent-green: #30d158;
      --accent-red: #ff453a;
      --text-main: #f5f5f7;
      --text-muted: #86868b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      width: 100%;
      max-width: 600px;
      margin-bottom: 24px;
      text-align: center;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .notify-banner {
      width: 100%;
      max-width: 600px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .notify-banner p {
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.4;
    }

    .btn {
      background-color: var(--accent-blue);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 15px rgba(0, 122, 255, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 122, 255, 0.6);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.disabled {
      background-color: #3a3a3c;
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-install {
      background-color: transparent;
      border: 1px solid var(--border-card);
      color: var(--text-main);
      box-shadow: none;
    }

    .btn-install:hover {
      background: rgba(255,255,255,0.05);
      box-shadow: none;
    }

    main {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .signal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease;
    }

    .signal-card:hover {
      transform: translateY(-2px);
    }

    .signal-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
    }

    .signal-card.buy::before {
      background-color: var(--accent-green);
    }

    .signal-card.sell::before {
      background-color: var(--accent-red);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .symbol {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .direction {
      font-size: 0.85rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .buy .direction {
      background-color: rgba(48, 209, 88, 0.15);
      color: var(--accent-green);
    }

    .sell .direction {
      background-color: rgba(255, 69, 58, 0.15);
      color: var(--accent-red);
    }

    .card-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .confidence {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .reasons {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
      align-self: flex-end;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    /* PWA Install Promo */
    #install-promo {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Forex Signals</h1>
    <p class="subtitle">ระบบวิเคราะห์จุดเข้าสัญญาณเรียลไทม์ 24 ชม.</p>
  </header>

  <div class="notify-banner">
    <p id="notify-status">เปิดการแจ้งเตือน Push Notification เพื่อรับสัญญาณซื้อขายตรงเข้ามือถือทันทีโดยไม่ต้องเปิดแอปค้างไว้</p>
    <div style="display: flex; gap: 10px;">
      <button id="btn-notify" class="btn">🔔 เปิดแจ้งเตือน</button>
      <button id="btn-install" class="btn btn-install">📲 ติดตั้งลงเครื่อง</button>
    </div>
  </div>

  <main id="signal-container">
    <div class="empty-state">กำลังดึงข้อมูลสัญญาณล่าสุด...</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
